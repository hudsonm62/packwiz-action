name: Packwiz Action
description: packwiz binaries for use in GitHub Actions
author: Hudson M.
branding:
  color: blue
  icon: folder
inputs:
  args:
    description: The arguments to pass to the packwiz command
    required: true
runs:
  using: composite
  steps:
    - name: Make Executable (Linux/macOS)
      if: runner.os == 'Linux' || runner.os == 'macOS'
      run: chmod +x $GITHUB_ACTION_PATH/bin/${{ runner.os }}/packwiz
      shell: bash

    - name: Run packwiz
      run: $GITHUB_ACTION_PATH/bin/${{ runner.os }}/packwiz ${{ inputs.args }}
      shell: bash
